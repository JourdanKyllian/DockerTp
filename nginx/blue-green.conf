# Active : Blue
upstream active_backend {
    server api-blue:3000;
}

# Standby : Green (pret mais pas de trafic)
upstream standby_backend {
    server api-green:3000;
}

server {
    listen 80;

    # Le trafic normal va vers Blue
    location / {
        proxy_pass http://active_backend;
        proxy_set_header Host $host;
    }

    # Un chemin secret pour tester Green avant de basculer
    location /test-standby/ {
        proxy_pass http://standby_backend/;
        proxy_set_header Host $host;
    }
}
